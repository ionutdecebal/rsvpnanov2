name: CI - iOS

on:
  push:
    paths:
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradle/wrapper/**'
      - 'RSVPNanoCompanion/shared/**'
      - 'RSVPNanoCompanion/ios/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradle/wrapper/**'
      - 'RSVPNanoCompanion/shared/**'
      - 'RSVPNanoCompanion/ios/**'
      - '.github/workflows/**'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Run shared tests
        run: bash ./gradlew :shared:check --no-daemon
      - name: Build shared XCFramework
        run: bash RSVPNanoCompanion/tools/build_shared_xcframework.sh
      - name: Upload shared artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shared-xcframework
          path: RSVPNanoCompanion/ios/RSVPNanoCompanion/SharedFrameworks/shared.xcframework
